<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Задание 1: Галерея</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 20px auto;
            padding: 20px;
            background-color: #f0f0f0;
        }
        h1 {
            color: #333;
            text-align: center;
        }
        .gallery {
            background-color: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        img {
            display: block;
            margin: 20px auto;
            max-width: 100%;
            border: 2px solid #ddd;
            border-radius: 5px;
        }
        .back-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: #0066cc;
            text-decoration: none;
        }
        .back-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="gallery">
        <h1>Моя галерея</h1>
<img src="https://placekitten.com/400/300" alt="Милый котик" width="400" height="300">
 <img src="https://placedog.net/400/300" alt="Веселая собачка" width="400" height="300">
<img src="https://cdn-icons-png.flaticon.com/512/25/25694.png" alt="Уютный домик" width="300" height="300">
        
        <a href="index.html" class="back-link">← Назад к списку заданий</a>
    </div>
</body>
</html>
