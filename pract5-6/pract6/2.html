<!DOCTYPE html>

        h1 {

        }
        .container {
            background-color: white;
            padding: 20px;

        .image-block {
            margin: 30px 0;
            padding: 15px;

        img {

            border-radius: 5px;
        }
        .back-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: #0066cc;
            text-decoration: none;
        }
        .back-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Эксперименты с размерами</h1>
