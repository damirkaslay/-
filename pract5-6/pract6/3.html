<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Задание 3: Картинка-ссылка</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 20px auto;
            padding: 20px;
            background-color: #f0f0f0;
            text-align: center;
        }
        h1 {
            color: #333;
        }
        .container {
            background-color: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        .home-link {
            display: inline-block;
            margin: 20px 0;
        }
        .home-link img {
            width: 100px;
            height: 100px;
            transition: transform 0.3s;
        }
        .home-link img:hover {
            transform: scale(1.1);
        }
        .description {
            color: #666;
            margin-top: 20px;
        }
        .back-link {
            display: block;
            margin-top: 30px;
            color: #0066cc;
            text-decoration: none;
        }
        .back-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Кликни на кота</h1>
        
     
        <a href="https://yandex.ru" target="_blank" class="home-link">
            <img src="C:\Users\Programmer\Desktop\pract5-6\pract6\images\a1.jpg"
                 alt="Котик" 
                 title="Перейти на Яндекс">
        </a>
        
        <p class="description">Нажми на кота, чтобы открыть Яндекс в новой вкладке</p>
        
        <a href="index.html" class="back-link">← Назад к списку заданий</a>
    </div>
</body>
</html>
